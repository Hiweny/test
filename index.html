<title>Randomness</title>
<style>
*{box-sizing:border-box}
html,body{margin:0;min-height:100%;background:#000;color:#f9f3cc;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
body{overflow-x:hidden}
#scene{position:fixed;inset:0;z-index:0;width:100%;height:100%;display:block;background:#000}
.wrap{position:relative;z-index:1;min-height:100vh;width:min(760px,100%);margin:auto;padding:38px 20px 80px;display:flex;flex-direction:column;justify-content:center;transition:padding .45s cubic-bezier(.2,.8,.2,1),justify-content .45s ease}
.wrap.top{justify-content:flex-start;padding-top:42px}
.brand{align-self:flex-start;text-align:left;margin:0 0 10px;font-size:clamp(35px,10vw,68px);line-height:.96;letter-spacing:-.065em;font-weight:760;background:linear-gradient(115deg,#fff4b8 0%,#ffd08a 24%,#ff88bf 52%,#9ad7ff 78%,#d9b8ff 100%);-webkit-background-clip:text;background-clip:text;color:transparent}
.line{align-self:flex-start;margin:0 0 30px;max-width:680px;text-align:left;font-size:clamp(14px,3.5vw,18px);line-height:1.75;font-weight:400;letter-spacing:.02em;color:rgba(255,247,222,.76);min-height:31px}
.tabs{display:flex;justify-content:flex-start;gap:12px;flex-wrap:wrap}
.tab{border:1px solid rgba(255,255,255,.16);background:rgba(255,255,255,.075);color:rgba(255,247,222,.84);border-radius:999px;padding:9px 24px;font-size:14px;cursor:pointer;backdrop-filter:blur(14px) saturate(150%);-webkit-backdrop-filter:blur(14px) saturate(150%);transition:transform .2s ease,background .25s ease,border-color .25s ease,color .25s ease}
.tab:hover{transform:translateY(-1px);background:rgba(255,255,255,.12)}
.tab.on{background:rgba(255,214,158,.18);border-color:rgba(255,214,158,.5);color:#fff}
.list{overflow:hidden;max-height:0;opacity:0;transform:translateY(-12px) scale(.99);margin-top:0;transition:max-height .5s cubic-bezier(.2,.9,.18,1),opacity .32s ease,transform .5s cubic-bezier(.2,.9,.18,1),margin-top .5s cubic-bezier(.2,.9,.18,1)}
.list.open{max-height:9999px;opacity:1;transform:translateY(0) scale(1);margin-top:24px}
.list-inner{display:flex;gap:14px;flex-direction:column}
.card{border-radius:22px;overflow:hidden;background:rgba(10,22,38,.42);border:1px solid rgba(255,255,255,.1);box-shadow:0 18px 60px rgba(0,0,0,.34);backdrop-filter:blur(10px) saturate(130%);-webkit-backdrop-filter:blur(10px) saturate(130%);will-change:transform;transition:background .6s ease}
.head{padding:15px 17px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;font-weight:650;gap:8px}
.head .hd-left{display:flex;align-items:center;gap:10px;min-width:0;flex:1}
.zodiac-inp,.hero-inp{width:100px;padding:4px 10px;border-radius:8px;border:1px solid rgba(255,255,255,.3);background:rgba(0,0,0,.35);color:#fff;font-size:13px;outline:0;font-weight:400}
.zodiac-inp::placeholder,.hero-inp::placeholder{color:rgba(255,255,255,.35)}
.chev{transition:.35s ease;opacity:.72;flex-shrink:0}
.card.open .chev{transform:rotate(180deg)}
.play-btn{width:28px;height:28px;border-radius:50%;border:2px solid rgba(255,255,255,.6);background:rgba(255,255,255,.12);cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .25s ease}
.play-btn:hover{background:rgba(255,255,255,.22);border-color:#fff}
.play-btn .tri{width:0;height:0;border-left:10px solid rgba(255,255,255,.8);border-top:6px solid transparent;border-bottom:6px solid transparent;margin-left:3px}
.play-btn.playing .tri{width:10px;height:10px;border:none;background:rgba(255,255,255,.8);margin-left:0;border-radius:2px}
.play-btn.playing:after{content:"";position:absolute;width:3px;height:10px;background:rgba(255,255,255,.8);border-radius:2px;right:3px}
.body{max-height:0;overflow:hidden;opacity:0;transition:max-height .45s cubic-bezier(.2,.9,.18,1),opacity .3s ease}
.body.open{max-height:2000px;opacity:1}
.inner{min-height:0}
.load,.err{padding:28px;text-align:center;color:rgba(249,243,204,.52)}
.picwrap{padding:12px}
.picwrap img,.picwrap video{display:block;width:100%;height:auto;border-radius:18px;box-shadow:0 16px 50px rgba(0,0,0,.38);background:rgba(0,0,0,.32)}
.actions{display:flex;justify-content:flex-end;gap:8px;padding:0 12px 12px}
.btn{border:0;border-radius:999px;padding:7px 14px;background:rgba(255,255,255,.12);color:#fff;cursor:pointer;text-decoration:none;font-size:13px;transition:background .25s ease,transform .2s ease,color .25s ease}
.btn:hover{transform:translateY(-1px);background:rgba(255,255,255,.18)}
.btn.ok{background:linear-gradient(135deg,rgba(120,220,170,.92),rgba(95,180,255,.82));color:#fff}
.bubble{position:relative;margin:16px 18px 18px 24px;width:fit-content;max-width:calc(100% - 48px);padding:15px 18px 16px;border-radius:20px 20px 20px 7px;line-height:1.82;font-size:15px;letter-spacing:.01em;word-break:break-word;white-space:pre-wrap;color:rgba(255,250,235,.94);background:linear-gradient(135deg,rgba(255,255,255,.2),rgba(255,255,255,.08));border:1px solid rgba(255,255,255,.18);box-shadow:0 14px 34px rgba(0,0,0,.22),inset 0 1px rgba(255,255,255,.16);backdrop-filter:blur(18px) saturate(165%);-webkit-backdrop-filter:blur(18px) saturate(165%);animation:msgPop .46s cubic-bezier(.2,1.15,.3,1) both}
.bubble:before{content:"";position:absolute;left:-7px;bottom:0;width:17px;height:17px;background:inherit;border-left:1px solid rgba(255,255,255,.16);border-bottom:1px solid rgba(255,255,255,.16);clip-path:polygon(0 100%,100% 0,100% 100%)}
@keyframes msgPop{0%{opacity:0;transform:translateY(18px) scale(.94)}62%{opacity:1;transform:translateY(-3px) scale(1.012)}100%{opacity:1;transform:translateY(0) scale(1)}}

/* Carousel */
.carousel{position:relative;padding:12px;overflow:hidden;touch-action:pan-y}
.carousel-track{display:flex;transition:transform .45s cubic-bezier(.25,.8,.25,1);will-change:transform}
.carousel-track img{flex:0 0 100%;width:100%;max-height:70vh;object-fit:contain;border-radius:18px;box-shadow:0 16px 50px rgba(0,0,0,.38);background:rgba(0,0,0,.32);pointer-events:none}
.carousel-nav{display:flex;justify-content:center;gap:8px;padding:8px 0 0}

.carousel-dot.active{background:rgba(255,255,255,.85);transform:scale(1.4)}
.carousel-arrow{position:absolute;top:50%;transform:translateY(-50%);width:36px;height:36px;border-radius:50%;background:rgba(0,0,0,.45);border:1px solid rgba(255,255,255,.2);color:#fff;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:2;transition:all .25s ease;-webkit-backdrop-filter:blur(8px);backdrop-filter:blur(8px)}
.carousel-arrow:hover{background:rgba(0,0,0,.65);border-color:rgba(255,255,255,.4)}
.carousel-arrow.left{left:20px}
.carousel-arrow.right{right:20px}

/* Voice list */
.voice-card{padding:0}
.voice-hero{display:flex;align-items:center;gap:12px;padding:14px 18px 10px}
.voice-hero img{width:48px;height:48px;border-radius:12px;object-fit:cover;border:2px solid rgba(255,255,255,.2)}
.voice-hero span{font-size:16px;font-weight:650;color:rgba(255,250,235,.9)}
.voice-list{display:flex;flex-direction:column;gap:8px;padding:8px 14px 14px}
.voice-item{display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:14px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.1);cursor:pointer;transition:all .25s ease}
.voice-item:hover{background:rgba(255,255,255,.14)}
.voice-item .v-play{width:26px;height:26px;border-radius:50%;border:2px solid rgba(255,255,255,.5);background:rgba(255,255,255,.1);flex-shrink:0;display:flex;align-items:center;justify-content:center;position:relative}
.voice-item .v-play .vtri{width:0;height:0;border-left:9px solid rgba(255,255,255,.7);border-top:5px solid transparent;border-bottom:5px solid transparent;margin-left:2px}
.voice-item .v-play.playing .vtri{width:8px;height:8px;border:none;background:rgba(255,255,255,.7);margin-left:0;border-radius:1px}
.voice-item .v-text{font-size:14px;color:rgba(255,250,235,.85);flex:1;line-height:1.5}

/* Audio player */
.audio-bar{display:flex;align-items:center;gap:12px;padding:10px 18px 14px}
.audio-bar audio{flex:1;height:36px;border-radius:10px}

/* Music card */
.music-card{padding:14px 18px 16px;display:flex;align-items:center;gap:14px}
.music-cover{width:60px;height:60px;border-radius:14px;object-fit:cover;flex-shrink:0;box-shadow:0 8px 24px rgba(0,0,0,.35);background:rgba(255,255,255,.06)}
.music-info{flex:1;min-width:0}
.music-name{font-size:16px;font-weight:650;color:rgba(255,250,235,.92);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.music-artist{font-size:13px;color:rgba(255,250,235,.55);margin-top:4px}
.music-ctrl{flex-shrink:0}
.music-ctrl .btn{white-space:nowrap}
.bubble{display:inline-block;padding:12px 16px;border-radius:16px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.1);color:rgba(255,255,255,.82);font-size:14px;line-height:1.7;white-space:pre-wrap;word-break:break-word}

/* ===== Collection / Fav Styles ===== */
.fav-toolbar{display:flex;gap:8px;flex-wrap:wrap;padding:0 0 8px}
.fav-toolbar .btn{padding:6px 14px;font-size:13px}
.fav-search{width:100%;padding:8px 14px;border-radius:12px;border:1px solid rgba(255,255,255,.18);background:rgba(0,0,0,.35);color:#fff;font-size:14px;outline:0;margin-bottom:10px}

// Zodiac
function getZodiac(){try{return localStorage.getItem('zodiac_sign')||''}catch(e){return''}}
function setZodiac(v){try{localStorage.setItem('zodiac_sign',v)}catch(e){}}
function normZodiac(s){s=s.trim();return s.replace(/座$/,'')}
function fmtZodiac(raw){
  let s=raw.replace(/\\n/g,'\n'),meta='',body=s;
  let m=s.match(/星座：(.+?)\s+贵人方位：(.+?)\s+贵人星座：(.+?)\s+幸运数字：(.+?)\s+幸运颜色：(.+?)(?=\s*(?:整体运势|综合运势|爱情运势|财富运势|事业运势|提示|$))/);
  if(m){meta='🌟 星座：'+m[1]+'\n🧭 贵人方位：'+m[2]+'\n♈ 贵人星座：'+m[3]+'\n🔢 幸运数字：'+m[4]+'\n🎨 幸运颜色：'+m[5];body=s.slice(s.indexOf(m[0])+m[0].length)}
  let sections=[],parts=body.split(/(?=(?:整体运势|综合运势|爱情运势|财富运势|事业运势|提示)[：:])/);
  parts.forEach(p=>{p=p.trim();if(!p)return;let colon=p.indexOf('：');if(colon===-1)colon=p.indexOf(':');if(colon>-1){let t=p.slice(0,colon),c=p.slice(colon+1).trim();sections.push('💬 '+t+'：'+c)}else sections.push(p)});
  return (meta?meta+'\n\n':'')+sections.join('\n\n');
}

// Audio toggle - use blob+then chain to preserve user gesture
function toggleAudio(i){
  let a=apis[active][i],btn=document.getElementById('pbtn'+i);
  if(currentAudio&&currentAudio.i===i&&!currentAudio.el.paused){
    currentAudio.el.pause();btn.classList.remove('playing');
    return;
  }
  if(currentAudio){currentAudio.el.pause();let pb=document.getElementById('pbtn'+currentAudio.i);if(pb)pb.classList.remove('playing')}
  btn.classList.add('playing');
  let src=a.url;
  if(a.kind==='voice'){let inp=document.getElementById('heroinp'),h=inp?inp.value.trim()||'李白':'李白';src=a.url+'?msg='+encodeURIComponent(h)}
  let url=(a.proxy?C:'')+src+'?_='+Date.now();
  fetch(url).then(r=>r.blob()).then(blob=>{
    let blobUrl=URL.createObjectURL(blob);
    let el=new Audio(blobUrl);
    el.play().catch(()=>{btn.classList.remove('playing')});
    currentAudio={el,i,url:blobUrl};
    el.onended=()=>{btn.classList.remove('playing');currentAudio=null};
    el.onerror=()=>{btn.classList.remove('playing');currentAudio=null};
  }).catch(()=>{btn.classList.remove('playing')});
}

        imgs.forEach((src,k)=>{
          let imgEl=document.getElementById(cid+'_img'+k);
          if(!imgEl)return;
          fetch(C+src.replace(/^http:/,'https:')).then(r=>r.blob()).then(blob=>{
            imgEl.src=URL.createObjectURL(blob);
          }).catch(()=>{imgEl.style.display='none'});
        });
        (function(id,total){let el=document.getElementById(id),sx=0;el.addEventListener('touchstart',e=>{sx=e.touches[0].clientX});el.addEventListener('touchend',e=>{let dx=e.changedTouches[0].clientX-sx;if(Math.abs(dx)>50)carouselShift(id,dx<0?1:-1)})})(cid,imgs.length);
        setTimeout(()=>{let el=document.getElementById(cid);if(el)el.scrollIntoView({behavior:'smooth',block:'center'})},100);
      }else{

function carouselShift(cid,dir){
  let el=document.getElementById(cid),track=el.querySelector('.carousel-track'),dots=el.querySelectorAll('.carousel-dot');
  let total=dots.length,idx=carouselState[cid]||0;
  idx=(idx+dir+total)%total;carouselState[cid]=idx;
  track.style.transform=`translateX(-${idx*100}%)`;
  dots.forEach((d,k)=>d.classList.toggle('active',k===idx));
}
function carouselGo(cid,idx){
  let el=document.getElementById(cid),track=el.querySelector('.carousel-track'),dots=el.querySelectorAll('.carousel-dot');
  carouselState[cid]=idx;track.style.transform=`translateX(-${idx*100}%)`;
  dots.forEach((d,k)=>d.classList.toggle('active',k===idx));
}

function playMusicUrl(url,btn){
  if(currentAudio&&currentAudio.el&&currentAudio.url===url&&!currentAudio.el.paused){
    currentAudio.el.pause();btn.textContent='▶ 播放';btn.classList.remove('ok');return;
  }
  if(currentAudio&&currentAudio.el&&currentAudio.url===url&&currentAudio.el.paused){
    currentAudio.el.play();btn.textContent='⏸ 暂停';btn.classList.add('ok');return;
  }
  if(currentAudio){currentAudio.el.pause();document.querySelectorAll('.music-ctrl .btn.ok').forEach(x=>{x.textContent='▶ 播放';x.classList.remove('ok')})}
  btn.textContent='⏸ 暂停';btn.classList.add('ok');
  let audio=new Audio(url);
  audio.play();
  currentAudio={el:audio,i:-1,url};
  audio.onended=()=>{btn.textContent='▶ 播放';btn.classList.remove('ok');currentAudio=null};
  audio.onerror=()=>{btn.textContent='▶ 播放';btn.classList.remove('ok');currentAudio=null};
}

async function playVoiceItem(el){
  let url=el.dataset.voice;
  if(currentAudio){currentAudio.el.pause();document.querySelectorAll('.voice-item .v-play.playing').forEach(x=>x.classList.remove('playing'))}
  let vp=el.querySelector('.v-play');
  vp.classList.add('playing');

(()=>{
const canvas=document.getElementById('scene'),ctx=canvas.getContext('2d');
let W,H,dpr,time=0,particles=[];
const PARTICLE_COUNT=800,SPEED=2.2,COLORS=[{r:80,g:230,b:255},{r:200,g:100,b:255},{r:255,g:80,b:180},{r:120,g:220,b:255},{r:255,g:255,b:255},{r:255,g:150,b:255}];
function resize(){dpr=devicePixelRatio||1;W=innerWidth;H=innerHeight;canvas.width=W*dpr;canvas.height=H*dpr;ctx.setTransform(dpr,0,0,dpr,0,0)}
function rc(){return COLORS[Math.floor(Math.random()*COLORS.length)]}
function make(){let t=Math.random(),shape=t<.3?'filled-star':t<.5?'outline-star':t<.65?'dot':t<.78?'cross':t<.88?'glow':'sparkle',z=Math.random()*2000+500;return{x:(Math.random()-.5)*W*3,y:(Math.random()-.5)*H*3,z,size:2+Math.random()*11,color:rc(),shape,phase:Math.random()*Math.PI*2,twinkleSpeed:.5+Math.random()*2,rotation:Math.random()*Math.PI*2,rotSpeed:(Math.random()-.5)*.018}}
function init(){particles=[];for(let i=0;i<PARTICLE_COUNT;i++){let p=make();p.z=Math.random()*2500;particles.push(p)}}
function star(x,y,s,c,a,r,fill){ctx.save();ctx.translate(x,y);ctx.rotate(r);ctx.beginPath();for(let i=0;i<10;i++){let rr=i%2?s*.4:s,ang=i*Math.PI/5-Math.PI/2;i?ctx.lineTo(Math.cos(ang)*rr,Math.sin(ang)*rr):ctx.moveTo(Math.cos(ang)*rr,Math.sin(ang)*rr)}ctx.closePath();ctx.shadowColor=`rgba(${c.r},${c.g},${c.b},${a*.6})`;ctx.shadowBlur=s;if(fill){ctx.fillStyle=`rgba(${c.r},${c.g},${c.b},${a})`;ctx.fill()}else{ctx.strokeStyle=`rgba(${c.r},${c.g},${c.b},${a})`;ctx.lineWidth=Math.max(.5,s*.12);ctx.stroke()}ctx.shadowBlur=0;ctx.restore()}
function cross(x,y,s,c,a){ctx.save();ctx.translate(x,y);ctx.strokeStyle=`rgba(${c.r},${c.g},${c.b},${a})`;ctx.lineWidth=Math.max(.5,s*.15);let r=s*.7;ctx.beginPath();ctx.moveTo(0,-r);ctx.lineTo(0,r);ctx.moveTo(-r,0);ctx.lineTo(r,0);ctx.stroke();ctx.restore()}
function glow(x,y,s,c,a){let g=ctx.createRadialGradient(x,y,0,x,y,s*3);g.addColorStop(0,`rgba(${c.r},${c.g},${c.b},${a*.5})`);g.addColorStop(1,`rgba(${c.r},${c.g},${c.b},0)`);ctx.fillStyle=g;ctx.beginPath();ctx.arc(x,y,s*3,0,7);ctx.fill()}
function dot(x,y,s,c,a){ctx.beginPath();ctx.arc(x,y,Math.max(.5,s*.35),0,7);ctx.fillStyle=`rgba(${c.r},${c.g},${c.b},${a})`;ctx.fill()}
function spark(x,y,s,c,a,r){ctx.save();ctx.translate(x,y);ctx.rotate(r);ctx.strokeStyle=`rgba(${c.r},${c.g},${c.b},${a})`;ctx.lineWidth=Math.max(.5,s*.1);let q=s*.8;ctx.beginPath();ctx.moveTo(0,-q);ctx.lineTo(0,q);ctx.moveTo(-q*.5,-q*.3);ctx.lineTo(q*.5,q*.3);ctx.moveTo(-q*.5,q*.3);ctx.lineTo(q*.5,-q*.3);ctx.stroke();ctx.restore()}
function animate(){time+=.016;ctx.fillStyle='#000';ctx.fillRect(0,0,W,H);let cx=W/2,cy=H/2,fl=400;particles.sort((a,b)=>b.z-a.z);for(const p of particles){p.z-=SPEED*(1+(2500-p.z)/2500);p.rotation+=p.rotSpeed;if(p.z<=10){Object.assign(p,make());p.z=2500;continue}let sc=fl/p.z,x=cx+p.x*sc,y=cy+p.y*sc,s=p.size*sc;if(x<-50||x>W+50||y<-50||y>H+50)continue;let a=1;if(p.z>2000)a=(2500-p.z)/500;if(p.z<200)a=p.z/200;a=Math.max(0,Math.min(1,a))*(.7+.3*Math.sin(time*p.twinkleSpeed+p.phase));if(s<.3){dot(x,y,s,p.color,a*.6);continue}if(p.shape==='filled-star')star(x,y,s,p.color,a,p.rotation,1);else if(p.shape==='outline-star')star(x,y,s,p.color,a,p.rotation,0);else if(p.shape==='cross')cross(x,y,s,p.color,a);else if(p.shape==='glow')glow(x,y,s,p.color,a);else if(p.shape==='sparkle')spark(x,y,s,p.color,a,p.rotation);else dot(x,y,s,p.color,a)}requestAnimationFrame(animate)}
addEventListener('resize',resize);resize();init();animate();
})();

const COL_KEY = 'snowline_media_collection_v1';
let favState = { items: [], filter: 'all', search: '', sort: 'newest' };
let favCarouselState = {};

function loadFav(){
  try{
    const raw = localStorage.getItem(COL_KEY);
    if(raw){
      let parsed = JSON.parse(raw);
      // 兼容旧格式 {items:[...]} 和新格式 [...]
      let data = Array.isArray(parsed) ? parsed : (parsed.items || []);
      // 清理旧格式的 _idx 字段
      data.forEach(it=>{ delete it._idx; delete it._albumIdx; });
      favState.items = data;
    }
  }catch(e){ favState.items = []; }
}
function saveFav(){
  try{ localStorage.setItem(COL_KEY, JSON.stringify(favState.items)); }catch(e){}
}
function genId(){ return 'fav_'+Date.now()+'_'+Math.random().toString(36).slice(2,7); }
function randHex(){ return '#' + Math.floor(Math.random()*16777215).toString(16).padStart(6,'0'); }
function collectMedia(i){
  try{
    const d=_collectData[i];
    if(!d){ alert('收藏数据丢失，请重新展开卡片后再试'); return; }
    loadFav();
    const item={
      id:genId(),platform:'direct',type:d.type,title:d.title||'未命名收藏',author:'',
      sourceUrl:d.urls?.[0]||d.videoUrl||'',coverUrl:d.urls?.[0]||'',
      mediaUrls:d.urls||[],videoUrl:d.videoUrl||'',tags:[],createdAt:Date.now(),note:'',color:randHex()
    };
    const exists=favState.items.some(x=>x.sourceUrl&&x.sourceUrl===item.sourceUrl);
    if(exists){alert('已收藏过此内容');return;}
    favState.items.unshift(item);
    saveFav();
    alert('已收藏 ✓');
  }catch(e){ alert('收藏失败：'+e.message); }
}
async function fetchColor(){
  try{ let r = await fetch(C+'https://shanhe.kim/api/wz/color.php?_='+Date.now()); let t = await r.text(); let c = t.replace(/[^#a-fA-F0-9]/g,'').slice(0,7); if(c.length===7) return c; }catch(e){} return randHex(); }
function parseUrl(url){
  url = url.trim();
  if(!url) return null;
  // 抖音
  let dy = url.match(/douyin\.com\/(?:video|note)\/(\w+)/) || url.match(/v\.douyin\.com\/(\w+)/);
  if(dy) return { platform:'douyin', type:'video', id:dy[1] };
  // 小红书
  let xhs = url.match(/xhslink\.com\/(\w+)/) || url.match(/xiaohongshu\.com\/discovery\/item\/(\w+)/);
  if(xhs) return { platform:'xhs', type:'image', id:xhs[1] };
  // 直接图片 (including API endpoints that return images)
  if(/\.(jpg|jpeg|png|gif|webp|bmp)(\?.*)?$/i.test(url)) return { platform:'direct', type:'image', id:null };
  // 图片API (no extension but known image APIs)
  if(/\/(tu|bing|image|img|pic)\//i.test(url) || /api.*\.(php|jpg|png)/i.test(url)) return { platform:'direct', type:'image', id:null };
  // 直接视频
  if(/\.(mp4|webm|mov)(\?.*)?$/i.test(url)) return { platform:'direct', type:'video', id:null };
  return { platform:'unknown', type:'unknown', id:null };
}

async function addFavFromUrl(url, apiType){
  const parsed = parseUrl(url);
  let item = { id: genId(), platform: parsed.platform, type: parsed.type, title: '', author: '', sourceUrl: url, coverUrl: '', mediaUrls: [], videoUrl: '', tags: [], createdAt: Date.now(), note: '', color: await fetchColor() };

  if(apiType==='douyin' || (apiType==='auto' && parsed.platform==='douyin')){
    try{
      let r = await fetch('https://api.bugpk.com/api/douyin?url='+encodeURIComponent(url));
      let j = await r.json();
      if(j.data){
        item.title = j.data.title||j.data.desc||'';
        item.author = j.data.author?.name||j.data.author||'';
        item.coverUrl = j.data.cover||j.data.coverUrl||'';
        item.videoUrl = j.data.videoUrl||j.data.video||j.data.url||'';
        item.mediaUrls = j.data.images||j.data.imgurl||j.data.pics||[];
        if(item.videoUrl) item.type = 'video';
        else if(item.mediaUrls.length) item.type = 'image';
        item.platform = 'douyin';
      }
    }catch(e){}
  }else if(apiType==='xhs' || (apiType==='auto' && parsed.platform==='xhs')){
    try{
      let r = await fetch('https://api.bugpk.com/api/xhsjx?url='+encodeURIComponent(url));
      let j = await r.json();
      if(j.data){
        item.title = j.data.title||j.data.desc||'';
        item.author = j.data.author?.name||j.data.author||'';
        item.coverUrl = j.data.cover||j.data.coverUrl||'';
        item.mediaUrls = j.data.images||j.data.imgurl||j.data.pics||[];
        item.type = item.mediaUrls.length ? 'image' : 'unknown';
        item.platform = 'xhs';
      }
    }catch(e){}
  }else if(apiType==='short'){
    try{
      let r = await fetch('https://api.bugpk.com/api/short_videos');
      let j = await r.json();
      if(j.data){
        item.title = j.data.title||'';
        item.author = j.data.author||'';
        item.coverUrl = j.data.cover||'';
        item.videoUrl = j.data.videoUrl||j.data.video||j.data.url||'';
        item.type = 'video';
        item.platform = 'short';
      }
    }catch(e){}
  }else{
    // manual / direct
    if(parsed.type==='image'){ item.mediaUrls=[url]; item.type='image'; }
    else if(parsed.type==='video'){ item.videoUrl=url; item.type='video'; }
    else { item.type='unknown'; }
  }
  if(!item.title) item.title = '未命名收藏';
  favState.items.unshift(item);
  saveFav();
  renderFavList();
}

function deleteFav(id){

function exportFav(){
  const blob = new Blob([JSON.stringify(favState.items,null,2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'snowline_media_collection_v1_'+new Date().toISOString().slice(0,10)+'.json';
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(()=>URL.revokeObjectURL(url), 1000);
}
function importFav(file){
  const reader = new FileReader();
  reader.onload = e => {
    try{
      let raw = JSON.parse(e.target.result);
      // 兼容旧格式 {items:[...]} 和新格式 [...]
      let data = Array.isArray(raw) ? raw : (raw.items || []);
      if(!Array.isArray(data)) throw new Error('无法识别的格式');
      // Merge: skip duplicates by sourceUrl
      const existing = new Set(favState.items.map(x=>x.sourceUrl));
      let added = 0;
      data.forEach(it=>{
        if(!it) return;
        // 兼容旧字段名
        if(!it.sourceUrl && it.url) it.sourceUrl = it.url;
        if(!it.mediaUrls && it.images) it.mediaUrls = it.images;
        if(!it.videoUrl && it.video) it.videoUrl = it.video;
        if(!it.sourceUrl) return;
        if(existing.has(it.sourceUrl)) return;
        if(!it.id) it.id = genId();
        if(!it.color) it.color = randHex();
        if(!it.createdAt) it.createdAt = Date.now();
        delete it._idx; delete it._albumIdx;
        favState.items.push(it);
        existing.add(it.sourceUrl);
        added++;
      });
      saveFav();
      renderFavList();
      alert('导入完成，新增 '+added+' 条收藏');
    }catch(err){ alert('导入失败：'+err.message); }
  };
  reader.readAsText(file);
}

}

function favCarouselShift(cid,dir){
  const el=document.getElementById(cid),track=el.querySelector('.carousel-track'),dots=el.querySelectorAll('.carousel-dot');
  const total=dots.length,idx=( (favCarouselState[cid]||0) + dir + total ) % total;
  favCarouselState[cid]=idx;
  track.style.transform=`translateX(-${idx*100}%)`;
  dots.forEach((d,k)=>d.classList.toggle('active',k===idx));
}
function favCarouselGo(cid,idx){
  const el=document.getElementById(cid),track=el.querySelector('.carousel-track'),dots=el.querySelectorAll('.carousel-dot');
  favCarouselState[cid]=idx; track.style.transform=`translateX(-${idx*100}%)`;
  dots.forEach((d,k)=>d.classList.toggle('active',k===idx));
}
async function loadFavImage(imgId,url){
  try{ let r=await fetch(C+url); let b=await r.blob(); let u=URL.createObjectURL(b); let img=document.getElementById(imgId); if(img)img.src=u; }
  catch(e){ let img=document.getElementById(imgId); if(img)img.style.display='none'; }
}
async function loadFavCarouselImages(cid){
  const el=document.getElementById(cid); if(!el)return;
  const imgs=el.querySelectorAll('img[data-src]');
  for(let img of imgs){
    let src=img.dataset.src; if(!src)continue;
    try{ let r=await fetch(C+src); let b=await r.blob(); img.src=URL.createObjectURL(b); }
    catch(e){ img.style.display='none'; }
  }
}

// Back to top: show only when scrolling UP
let lastScrollY = window.scrollY;
const backtopBtn = document.getElementById('backtop');
window.addEventListener('scroll', ()=>{
  const y = window.scrollY;
  if(y < 200){ backtopBtn.classList.remove('show'); }
  else if(y < lastScrollY){ backtopBtn.classList.add('show'); }
  else { backtopBtn.classList.remove('show'); }
  lastScrollY = y;
}, {passive:true});
</script>
