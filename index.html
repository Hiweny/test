<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Meteor Shower</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
  canvas { display: block; position: fixed; top: 0; left: 0; width: 100%; height: 100%; }
  #bgCanvas { z-index: 1; } #meteorCanvas { z-index: 2; } #fgCanvas { z-index: 3; }
</style>
</head>
<body>
<canvas id="bgCanvas"></canvas>
<canvas id="meteorCanvas"></canvas>
<canvas id="fgCanvas"></canvas>
<script src="meteor.js"></script>
</body>
</html>
